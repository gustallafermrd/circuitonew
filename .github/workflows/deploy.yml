name: Deploy to cPanel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          JOOMLA_API_TOKEN: ${{ secrets.JOOMLA_API_TOKEN }}

      - name: Deploy via lftp
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -e "set ftp:ssl-allow yes; set ssl:verify-certificate no; set net:max-retries 3; set net:reconnect-interval-base 5; mirror -R -v --parallel=3 out/ ./public_html/webce1/; quit" \
            -u "${{ secrets.FTP_USERNAME }}","${{ secrets.FTP_PASSWORD }}" \
            -p ${{ secrets.FTP_PORT }} \
            ${{ secrets.FTP_SERVER }}
